<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>
	<link rel="manifest"
	      href="/manifest.json">
		  
		  <meta name="theme-color"
		        content="#d40000">
		  
	

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Puntuar combate</title>

    <style>

        * {

            margin: 0;

            padding: 0;

            box-sizing: border-box;
        }

        body {

            background:
                    linear-gradient(
                            to bottom,
                            #080808,
                            #111
                    );

            color: white;

            font-family: Arial;

            padding: 25px;
        }

        .volver {

            display: inline-block;

            margin-bottom: 30px;

            padding: 14px 20px;

            background-color: #1e1e1e;

            border: 1px solid #333;

            border-radius: 16px;

            color: white;

            text-decoration: none;

            transition: 0.3s;
        }

        .volver:hover {

            background-color: red;
        }

        .box {

            max-width: 750px;

            margin: auto;

            background:
                    rgba(255,255,255,0.05);

            backdrop-filter: blur(18px);

            border: 1px solid rgba(255,255,255,0.08);

            border-radius: 32px;

            padding: 35px;

            box-shadow:
                    0 12px 40px rgba(0,0,0,0.55);
        }

        h1 {

            text-align: center;

            font-size: 42px;

            margin-bottom: 40px;
        }

        .fighters {

            display: flex;

            justify-content: space-between;

            align-items: center;

            gap: 20px;

            margin-bottom: 45px;
        }

        .fighter-card {

            width: 40%;

            background:
                    linear-gradient(
                            145deg,
                            #1b1b1b,
                            #111
                    );

            border: 2px solid rgba(255,255,255,0.06);

            border-radius: 24px;

            padding: 25px;

            text-align: center;

            box-shadow:
                    0 8px 25px rgba(0,0,0,0.4);
        }

        .fighter-number {

            color: red;

            font-size: 15px;

            font-weight: bold;

            margin-bottom: 12px;

            letter-spacing: 1px;
        }

        .fighter-name {

            font-size: 28px;

            font-weight: bold;

            line-height: 1.2;
        }

        .vs {

            font-size: 38px;

            font-weight: bold;

            color: red;

            text-shadow:
                    0 0 20px red;
        }

        .round-card {

            background:
                    rgba(255,255,255,0.04);

            border: 1px solid rgba(255,255,255,0.06);

            border-radius: 26px;

            padding: 28px;

            margin-bottom: 28px;
        }

        .round-title {

            text-align: center;

            font-size: 26px;

            font-weight: bold;

            color: gold;

            margin-bottom: 30px;
        }

        .score-grid {

            display: flex;

            gap: 20px;
        }

        .score-box {

            width: 50%;

            background-color: #1d1d1d;

            border-radius: 22px;

            padding: 22px;

            text-align: center;

            border: 1px solid #333;

            transition: 0.3s;
        }

        .score-box:hover {

            border-color: red;

            transform: translateY(-3px);
        }

        .score-name {

            font-size: 22px;

            font-weight: bold;

            margin-bottom: 18px;
        }

        .score-label {

            color: lightgray;

            margin-bottom: 14px;

            font-size: 14px;
        }

        input {

            width: 100%;

            padding: 18px;

            border: none;

            border-radius: 18px;

            background-color: #111;

            color: white;

            text-align: center;

            font-size: 28px;

            font-weight: bold;

            outline: none;

            transition: 0.3s;
        }

        input:focus {

            border: 2px solid red;
        }

        .guardar {

            width: 100%;

            padding: 20px;

            margin-top: 35px;

            border: none;

            border-radius: 20px;

            background:
                    linear-gradient(
                            to right,
                            gold,
                            #d4a200
                    );

            color: black;

            font-size: 20px;

            font-weight: bold;

            cursor: pointer;

            transition: 0.3s;

            box-shadow:
                    0 10px 30px rgba(255,215,0,0.25);
        }

        .guardar:hover {

            transform: scale(1.03);
        }

        @media(max-width: 750px) {

            .fighters {

                flex-direction: column;
            }

            .fighter-card {

                width: 100%;
            }

            .score-grid {

                flex-direction: column;
            }

            .score-box {

                width: 100%;
            }

            h1 {

                font-size: 32px;
            }

            .fighter-name {

                font-size: 24px;
            }
        }

    </style>

</head>

<body>

<a th:href="@{/evento(id=${evento})}"
   class="volver">

    ⬅ Volver cartelera

</a>

<div class="box">

    <h1>
        📊 Puntuar combate
    </h1>

    <div class="fighters">

        <div class="fighter-card">

            <div class="fighter-number">

                PELEADOR 1

            </div>

            <div class="fighter-name"
                 th:text="${combate.peleador1}">
            </div>

        </div>

        <div class="vs">

            VS

        </div>

        <div class="fighter-card">

            <div class="fighter-number">

                PELEADOR 2

            </div>

            <div class="fighter-name"
                 th:text="${combate.peleador2}">
            </div>

        </div>

    </div>

    <form action="/guardarPuntuacion"
          method="post">

        <input type="hidden"
               name="combate"
               th:value="${combate.id}">

        <input type="hidden"
               name="evento"
               th:value="${evento}">

        <!-- ROUND 1 -->

        <div class="round-card">

            <div class="round-title">

                🥊 ROUND 1

            </div>

            <div class="score-grid">

                <div class="score-box">

                    <div class="score-name"
                         th:text="${combate.peleador1}">
                    </div>

                    <div class="score-label">

                        Puntuación del round

                    </div>

                    <input type="number"
                           name="r1p1"
                           placeholder="10">

                </div>

                <div class="score-box">

                    <div class="score-name"
                         th:text="${combate.peleador2}">
                    </div>

                    <div class="score-label">

                        Puntuación del round

                    </div>

                    <input type="number"
                           name="r1p2"
                           placeholder="9">

                </div>

            </div>

        </div>

        <!-- ROUND 2 -->

        <div class="round-card">

            <div class="round-title">

                🥊 ROUND 2

            </div>

            <div class="score-grid">

                <div class="score-box">

                    <div class="score-name"
                         th:text="${combate.peleador1}">
                    </div>

                    <div class="score-label">

                        Puntuación del round

                    </div>

                    <input type="number"
                           name="r2p1"
                           placeholder="10">

                </div>

                <div class="score-box">

                    <div class="score-name"
                         th:text="${combate.peleador2}">
                    </div>

                    <div class="score-label">

                        Puntuación del round

                    </div>

                    <input type="number"
                           name="r2p2"
                           placeholder="9">

                </div>

            </div>

        </div>

        <!-- ROUND 3 -->

        <div class="round-card">

            <div class="round-title">

                🥊 ROUND 3

            </div>

            <div class="score-grid">

                <div class="score-box">

                    <div class="score-name"
                         th:text="${combate.peleador1}">
                    </div>

                    <div class="score-label">

                        Puntuación del round

                    </div>

                    <input type="number"
                           name="r3p1"
                           placeholder="10">

                </div>

                <div class="score-box">

                    <div class="score-name"
                         th:text="${combate.peleador2}">
                    </div>

                    <div class="score-label">

                        Puntuación del round

                    </div>

                    <input type="number"
                           name="r3p2"
                           placeholder="9">

                </div>

            </div>

        </div>

        <button type="submit"
                class="guardar">

            🔥 Guardar puntuación

        </button>

    </form>

</div>

</body>
</html>
