<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>

	<link rel="manifest"
	      href="/manifest.json">
		  
		  <meta name="theme-color"
		        content="#d40000">
		  
    <meta charset="UTF-8">

    <title>Moderar comentarios</title>

    <style>

        body {

            background-color: #111;

            color: white;

            font-family: Arial;

            padding: 40px;
        }

        h1 {

            color: gold;

            text-align: center;

            margin-bottom: 40px;
        }

        .comentario {

            background-color: #222;

            padding: 20px;

            border-radius: 15px;

            margin-bottom: 20px;
        }

        .usuario {

            color: red;

            font-size: 20px;

            font-weight: bold;
        }

        button {

            width: 100%;

            padding: 12px;

            margin-top: 15px;

            background-color: darkred;

            color: white;

            border: none;

            border-radius: 10px;

            cursor: pointer;
        }

    </style>

</head>

<body>

<h1>
    💬 Moderar comentarios
</h1>

<div th:each="c : ${comentarios}"

     class="comentario">

    <div class="usuario">

        <span th:text="${c.usuario}"></span>

    </div>

    <br>

    <div>

        <span th:text="${c.texto}"></span>

    </div>

    <a th:href="@{/borrarComentario(id=${c.id})}">

        <button>

            🗑 Borrar comentario

        </button>

    </a>

</div>

<a href="/admin">

    <button>

        ⬅ Volver

    </button>

</a>

</body>
</html>
