<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>
	<link rel="manifest"
	      href="/manifest.json">
		  
		  <meta name="theme-color"
		        content="#d40000">
	

    <meta charset="UTF-8">

    <title>Resultados</title>

    <style>

        body {

            background-color: #111;

            color: white;

            font-family: Arial;

            padding: 40px;
        }

        .box {

            background-color: #222;

            padding: 30px;

            border-radius: 15px;

            width: 500px;

            margin: auto;
        }

        h1 {

            color: gold;

            text-align: center;

            margin-bottom: 30px;
        }

        select,
        input {

            width: 100%;

            padding: 15px;

            margin-top: 15px;

            background-color: #333;

            color: white;

            border: none;

            border-radius: 10px;

            font-size: 16px;
        }

        button {

            width: 100%;

            padding: 15px;

            margin-top: 20px;

            background-color: gold;

            color: black;

            border: none;

            border-radius: 10px;

            font-size: 18px;

            font-weight: bold;

            cursor: pointer;
        }

    </style>

</head>

<body>

<div class="box">

    <h1>
        🏆 Poner resultado
    </h1>

    <form action="/guardarResultado"
          method="post">

        <select name="combate">

            <option th:each="c : ${combates}"

                    th:value="${c.id}"

                    th:text="${c.peleador1 + ' VS ' + c.peleador2}">

            </option>

        </select>

        <select name="ganador">

            <option value="1">
                Peleador 1
            </option>

            <option value="2">
                Peleador 2
            </option>

        </select>

        <select name="metodo">

            <option value="KO">
                KO
            </option>

            <option value="Submission">
                Submission
            </option>

            <option value="Decision">
                Decision
            </option>

        </select>

        <input type="number"

               name="round"

               placeholder="Round">

        <button type="submit">

            Guardar resultado

        </button>

    </form>

    <a href="/admin">

        <button>

            ⬅ Volver

        </button>

    </a>

</div>

</body>
</html>
