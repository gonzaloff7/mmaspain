<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <link rel="manifest"
          href="/manifest.json">

    <meta name="theme-color"
          content="#d40000">

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>MMA SPAIN</title>

    <style>

        * {

            margin: 0;

            padding: 0;

            box-sizing: border-box;
        }

        body {

            background:
                    radial-gradient(
                            circle at top,
                            #1b0000,
                            #080808 55%
                    );

            color: white;

            font-family: Arial;

            display: flex;

            justify-content: center;

            align-items: center;

            min-height: 100vh;

            overflow-x: hidden;

            padding: 25px;
        }

        .login-box {

            width: 100%;

            max-width: 430px;

            background:
                    rgba(255,255,255,0.05);

            backdrop-filter: blur(20px);

            border: 1px solid rgba(255,255,255,0.08);

            border-radius: 32px;

            padding: 45px;

            box-shadow:
                    0 15px 40px rgba(0,0,0,0.6);
        }

        .logo {

            width: 120px;

            height: 120px;

            border-radius: 50%;

            margin: auto;

            margin-bottom: 25px;

            background:
                    linear-gradient(
                            to bottom,
                            red,
                            darkred
                    );

            display: flex;

            align-items: center;

            justify-content: center;

            font-size: 55px;

            box-shadow:
                    0 0 35px rgba(255,0,0,0.45);
        }

        h1 {

            text-align: center;

            font-size: 42px;

            margin-bottom: 12px;
        }

        .subtitle {

            text-align: center;

            color: lightgray;

            margin-bottom: 35px;

            font-size: 17px;
        }

        .label {

            margin-bottom: 12px;

            margin-top: 20px;

            color: gold;

            font-size: 14px;

            letter-spacing: 1px;

            text-transform: uppercase;

            font-weight: bold;
        }

        input {

            width: 100%;

            padding: 18px;

            border: 1px solid #333;

            border-radius: 18px;

            background-color: #1b1b1b;

            color: white;

            font-size: 16px;

            outline: none;

            transition: 0.3s;
        }

        input:focus {

            border-color: red;

            box-shadow:
                    0 0 20px rgba(255,0,0,0.25);
        }

        .login-btn {

            width: 100%;

            min-height: 58px;

            margin-top: 30px;

            border: none;

            border-radius: 20px;

            background:
                    linear-gradient(
                            to right,
                            red,
                            darkred
                    );

            color: white;

            font-size: 18px;

            font-weight: bold;

            cursor: pointer;

            transition: 0.3s;

            box-shadow:
                    0 10px 30px rgba(255,0,0,0.25);
        }

        .login-btn:hover {

            transform: scale(1.03);
        }

        .register-btn {

            width: 100%;

            min-height: 58px;

            margin-top: 18px;

            border: none;

            border-radius: 20px;

            background:
                    linear-gradient(
                            to right,
                            gold,
                            #d4a200
                    );

            color: black;

            font-size: 18px;

            font-weight: bold;

            cursor: pointer;

            transition: 0.3s;

            box-shadow:
                    0 10px 30px rgba(255,215,0,0.2);
        }

        .register-btn:hover {

            transform: scale(1.03);
        }

        .error {

            margin-top: 22px;

            text-align: center;

            color: #ff4d4d;

            font-weight: bold;

            background-color: rgba(255,0,0,0.08);

            padding: 14px;

            border-radius: 16px;
        }

        .footer {

            text-align: center;

            margin-top: 35px;

            color: #888;

            font-size: 14px;
        }

        @media(max-width: 600px) {

            .login-box {

                padding: 30px;
            }

            h1 {

                font-size: 34px;
            }

            .logo {

                width: 95px;

                height: 95px;

                font-size: 42px;
            }
        }

    </style>

</head>

<body>

<div class="login-box">

    <div class="logo">

        🥊

    </div>

    <h1>
        MMA SPAIN
    </h1>

    <div class="subtitle">

        La comunidad definitiva de MMA 🔥

    </div>

    <form action="/login"
          method="post">

        <div class="label">

            📧 Email

        </div>

        <input type="email"
               name="email"
               placeholder="Tu email">

        <div class="label">

            🔒 Contraseña

        </div>

        <input type="password"
               name="password"
               placeholder="Tu contraseña">

        <button type="submit"
                class="login-btn">

            🔥 Entrar

        </button>

    </form>

    <p th:if="${error}"
       class="error">

        <span th:text="${error}"></span>

    </p>

    <a href="/register">

        <button type="button"
                class="register-btn">

            👑 Crear cuenta

        </button>

    </a>

    <div class="footer">

        MMA Spain © 2026

    </div>

</div>

<script>

if ("serviceWorker" in navigator) {

    navigator.serviceWorker.register("/sw.js");

}

</script>

</body>
</html>
