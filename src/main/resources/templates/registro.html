<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>

	<link rel="manifest"
	      href="/manifest.json">
		  <meta name="theme-color"
		        content="#d40000">
		  
	
    <meta charset="UTF-8">

    <title>Registro MMA</title>

    <style>

        body {

            background-color: #111;

            color: white;

            font-family: Arial;

            display: flex;

            justify-content: center;

            align-items: center;

            height: 100vh;
        }

        .box {

            background-color: #222;

            padding: 40px;

            border-radius: 15px;

            width: 350px;
        }

        h1 {

            color: red;

            text-align: center;
        }

        input {

            width: 100%;

            padding: 12px;

            margin-top: 10px;

            margin-bottom: 20px;

            background: #333;

            border: none;

            color: white;
        }

        button {

            width: 100%;

            padding: 12px;

            background-color: red;

            color: white;

            border: none;

            font-weight: bold;

            cursor: pointer;
        }

    </style>

</head>

<body>

<div class="box">

    <h1>
        🥊 Crear cuenta
    </h1>

	<div th:if="${error}"

	     style="
	     color: red;
	     margin-bottom: 20px;
	     text-align: center;
	     font-weight: bold;">

	    <span th:text="${error}"></span>

	</div>
	
    <form action="/register"
          method="post">

        <input
                type="text"
                name="nombre"
                placeholder="Nombre"
        >

        <input
                type="email"
                name="email"
                placeholder="Email"
        >

        <input
                type="password"
                name="password"
                placeholder="Contraseña"
        >

        <button type="submit">

            Crear cuenta
			
			<a href="/">

			    <button type="button">

			        ⬅ Volver al login

			    </button>

			</a>

        </button>

    </form>

</div>

</body>
</html>
