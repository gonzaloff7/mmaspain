<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>

	<link rel="manifest"
	      href="/manifest.json">
		  
		  <meta name="theme-color"
		        content="#d40000">
		  
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Editar perfil</title>

    <style>

        * {

            margin: 0;

            padding: 0;

            box-sizing: border-box;
        }

        body {

            background:
                    linear-gradient(
                            to bottom,
                            #080808,
                            #111
                    );

            color: white;

            font-family: Arial;

            padding: 25px;
        }

        .container {

            max-width: 750px;

            margin: auto;
        }

        .box {

            background:
                    rgba(255,255,255,0.05);

            backdrop-filter: blur(18px);

            border: 1px solid rgba(255,255,255,0.08);

            border-radius: 32px;

            padding: 40px;

            box-shadow:
                    0 12px 35px rgba(0,0,0,0.55);
        }

        .avatar {

            width: 130px;

            height: 130px;

            border-radius: 50%;

            background:
                    linear-gradient(
                            to bottom,
                            red,
                            darkred
                    );

            display: flex;

            justify-content: center;

            align-items: center;

            font-size: 55px;

            margin: auto;

            margin-bottom: 30px;

            box-shadow:
                    0 0 30px rgba(255,0,0,0.4);
        }

        h1 {

            text-align: center;

            font-size: 42px;

            margin-bottom: 35px;
        }

        .label {

            margin-top: 22px;

            margin-bottom: 12px;

            color: gold;

            font-size: 15px;

            font-weight: bold;

            letter-spacing: 1px;

            text-transform: uppercase;
        }

        input,
        textarea {

            width: 100%;

            padding: 18px;

            border: 1px solid #333;

            border-radius: 18px;

            background-color: #1b1b1b;

            color: white;

            font-size: 17px;

            outline: none;

            transition: 0.3s;
        }

        input:focus,
        textarea:focus {

            border-color: red;

            box-shadow:
                    0 0 20px rgba(255,0,0,0.2);
        }

        textarea {

            min-height: 160px;

            resize: none;

            line-height: 1.6;
        }

        .tip {

            margin-top: 10px;

            color: #999;

            font-size: 14px;
        }

        .buttons {

            margin-top: 35px;

            display: flex;

            flex-direction: column;

            gap: 18px;
        }

        button {

            width: 100%;

            padding: 20px;

            border: none;

            border-radius: 20px;

            font-size: 18px;

            font-weight: bold;

            cursor: pointer;

            transition: 0.3s;
        }

        button:hover {

            transform: scale(1.02);
        }

        .guardar {

            background:
                    linear-gradient(
                            to right,
                            red,
                            darkred
                    );

            color: white;

            box-shadow:
                    0 10px 30px rgba(255,0,0,0.25);
        }

        .volver {

            background:
                    linear-gradient(
                            to right,
                            #222,
                            #333
                    );

            color: white;
        }

        @media(max-width: 700px) {

            h1 {

                font-size: 32px;
            }

            .box {

                padding: 28px;
            }

            .avatar {

                width: 100px;

                height: 100px;

                font-size: 42px;
            }
        }

    </style>

</head>

<body>

<div class="container">

    <div class="box">

        <div class="avatar">

            🥊

        </div>

        <h1>
            ✏️ Editar perfil
        </h1>

        <form action="/guardarPerfil"
              method="post">

            <div class="label">

                👤 Username

            </div>

            <input type="text"
                   name="nombre"
                   placeholder="Tu username MMA..."
                   th:value="${usuario.nombre}">

            <div class="label">

                🔥 Bio MMA

            </div>

            <textarea name="bio"
                      placeholder="Cuéntale a la comunidad tu estilo, luchadores favoritos o experiencia MMA..."
                      th:text="${usuario.bio}"></textarea>

            <div class="tip">

                Ejemplo: Fan del striking, amante del ground game y predictor profesional de MMA.

            </div>

            <div class="label">

                🌍 País / Bandera

            </div>

            <input type="text"
                   name="bandera"
                   placeholder="España 🇪🇸"
                   th:value="${usuario.bandera}">

            <div class="buttons">

                <button type="submit"
                        class="guardar">

                    🔥 Guardar cambios

                </button>

            </div>

        </form>

    </div>

    <div class="buttons">

        <a href="/settings">

            <button class="volver">

                ⬅ Volver Settings

            </button>

        </a>

    </div>

</div>

</body>
</html>
