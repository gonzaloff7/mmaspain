<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>
	
	<link rel="manifest"
	      href="/manifest.json">
		  
		  <meta name="theme-color"
		        content="#d40000">
		  

    <meta charset="UTF-8">

    <title>Crear combate</title>

    <style>

        body {

            background-color: #111;

            color: white;

            font-family: Arial;

            padding: 40px;
        }

        .box {

            background-color: #222;

            padding: 30px;

            border-radius: 15px;

            width: 500px;

            margin: auto;
        }

        h1 {

            color: gold;

            text-align: center;

            margin-bottom: 30px;
        }

        select {

            width: 100%;

            padding: 15px;

            margin-top: 15px;

            background-color: #333;

            color: white;

            border: none;

            border-radius: 10px;

            font-size: 16px;
        }

        button {

            width: 100%;

            padding: 15px;

            margin-top: 20px;

            background-color: gold;

            color: black;

            border: none;

            border-radius: 10px;

            font-size: 18px;

            font-weight: bold;

            cursor: pointer;
        }

    </style>

</head>

<body>

<div class="box">

    <h1>
        🥊 Crear combate
    </h1>

    <form action="/guardarCombate"
          method="post">

        <select name="evento">

            <option th:each="e : ${eventos}"

                    th:value="${e.id}"

                    th:text="${e.nombre}">

            </option>

        </select>

        <select name="peleador1">

            <option th:each="p : ${peleadores}"

                    th:value="${p.id}"

                    th:text="${p.nombre}">

            </option>

        </select>

        <select name="peleador2">

            <option th:each="p : ${peleadores}"

                    th:value="${p.id}"

                    th:text="${p.nombre}">

            </option>

        </select>

        <button type="submit">

            Crear combate

        </button>

    </form>

    <a href="/admin">

        <button>

            ⬅ Volver

        </button>

    </a>

</div>

</body>
</html>
